<div class="barra-filtros">
    <button onclick="toggleFiltrosTransacao()" id="btnToggleFiltros">
        ⬆️️ Filtros
    </button>
</div>

<div id="painelFiltros">
    <div class="mb-4" id="divConta"><label for="idConta" class="opacity-80">Listar por Conta Corrente:</label>
        <select id="idConta" class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all" onchange="filtrarTransacoes(1)">
            <option value="">-- Escolha a conta corrente --</option>
        </select>
    </div>
    <div class="mb-4" id="divCartao"><label for="idCartao" class="opacity-80">Listar por Cartão de Crédito:</label>
        <select id="idCartao" class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all" onchange="filtrarTransacoes(0)">
            <option value="">-- Escolha o cartão de crédito --</option>
        </select>
    </div>
</div>

<h1>📋 Listando as transações mais recentes para <span id="descricaoTipoTransacoes">todas as</span> <b><span id="descricaoNomeTransacoes">Contas e Cartões</span></b>:</h1>
<br>
<table border="1" width="100%" class="tabela-listagem-transacoes">
    <thead>
    <tr>
        <th>Ações</th>
        <th>Data</th>
        <th>Valor</th>
        <th>Descrição</th>
        <th>Quantidade</th>
    </tr>
    </thead>
    <tbody id="tabela-transacoes"></tbody>
    <tfoot id="footer-transacoes"></tfoot>
</table>

<div class="paginacao">
    <button id="prevBtn">⬅️ Anterior</button>
    <span id="pageInfo"></span>
    <button id="nextBtn">Próxima ➡️</button>
</div>

<script>
    carregarSelectsTransacoes(0);
</script>
